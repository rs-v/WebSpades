name: Build BetterSpades

on:
  push:
    branches: [ main, master, standalone ]
  pull_request:
    branches: [ main, master, standalone ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-wasm:
    name: WebAssembly (Emscripten)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure CMake
        run: |
          mkdir -p build-wasm && cd build-wasm
          emcmake cmake -DCMAKE_BUILD_TYPE=Release ..

      - name: Build
        run: |
          cd build-wasm
          cmake --build . --target client -j$(nproc)

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetterSpades-wasm
          path: |
            build-wasm/BetterSpades/client.html
            build-wasm/BetterSpades/client.js
            build-wasm/BetterSpades/client.wasm
            build-wasm/BetterSpades/client.data

      - name: Create index.html redirect
        if: github.event_name == 'push'
        run: |
          cat > build-wasm/BetterSpades/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0;url=client.html">
            <title>BetterSpades</title>
          </head>
          <body>
            <p>Redirecting to <a href="client.html">client.html</a>...</p>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build-wasm/BetterSpades

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push'
    needs: build-wasm
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

