name: Build BetterSpades

on:
  push:
    branches: [ main, master, standalone ]
  pull_request:
    branches: [ main, master, standalone ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-wasm:
    name: WebAssembly (Emscripten)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure CMake
        run: |
          mkdir -p build-wasm && cd build-wasm
          emcmake cmake -DCMAKE_BUILD_TYPE=Release ..

      - name: Build
        run: |
          cd build-wasm
          cmake --build . --target client -j$(nproc)

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetterSpades-wasm
          path: |
            BetterSpades/build-wasm/BetterSpades/client.html
            BetterSpades/build-wasm/BetterSpades/client.js
            BetterSpades/build-wasm/BetterSpades/client.wasm
            BetterSpades/build-wasm/BetterSpades/client.data

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: BetterSpades/build-wasm/BetterSpades

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push'
    needs: build-wasm
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

